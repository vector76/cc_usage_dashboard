<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Claude Usage Dashboard</title>
<link rel="icon" type="image/png" href="/favicon.png">
<style>
  body { font-family: system-ui, -apple-system, sans-serif; margin: 1rem; background: #fafafa; color: #222; }
  h1 { margin: 0 0 1rem 0; font-size: 1.4rem; }
  h2 { margin-top: 0; font-size: 1.1rem; }
  h3 { margin: 0 0 0.5rem 0; font-size: 0.95rem; color: #444; }
  section { background: #fff; border: 1px solid #ddd; padding: 1rem; margin-bottom: 1rem; border-radius: 4px; }
  section:last-child { margin-bottom: 0; }
  .info-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .info-row > section { margin-bottom: 0; }
  @media (max-width: 700px) { .info-row { grid-template-columns: 1fr; } }
  .chart-block { margin-bottom: 1rem; }
  .chart-block:last-child { margin-bottom: 0; }
  .kv { display: grid; grid-template-columns: max-content auto; column-gap: 1rem; row-gap: 0.25rem; margin: 0; }
  .kv dt { color: #666; }
  .kv dd { margin: 0; font-variant-numeric: tabular-nums; }
  .muted { color: #888; }
  svg { width: 100%; height: auto; display: block; }
</style>
</head>
<body>
<h1>Claude Usage Dashboard</h1>

<div class="info-row">
  <section id="status">
    <h2>Status</h2>
    <dl class="kv" id="status-kv"><dd class="muted">Loading…</dd></dl>
  </section>
  <section id="consumption">
    <h2>Consumption (last 24h)</h2>
    <dl class="kv" id="consumption-kv"><dd class="muted">Loading…</dd></dl>
  </section>
</div>

<section>
  <h2>Burn-down</h2>
  <div class="chart-block">
    <h3>Session window (last 15h, current window in rightmost third)</h3>
    <svg id="chart-session" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet"></svg>
  </div>
  <div class="chart-block">
    <h3>Weekly window</h3>
    <svg id="chart-weekly" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet"></svg>
  </div>
</section>

<script src="/grouping.js"></script>
<script>
function fmt(x, d) {
  if (x == null || (typeof x === "number" && !isFinite(x))) return "—";
  return Number(x).toFixed(d == null ? 2 : d);
}
function fmtTime(s) { return s ? new Date(s).toLocaleString() : "—"; }
// fmtAxisTime renders a short 12-hour AM/PM label for the burn-down X
// axis. Short windows (session, ≤24h) get "h:mm AM/PM" in local time;
// longer windows (weekly) get the weekday prefix so "Thu 11:00 PM" is
// unambiguous when the chart spans a week.
function fmtAxisTime(ms, durationMs) {
  const d = new Date(ms);
  let h = d.getHours();
  const mm = String(d.getMinutes()).padStart(2, "0");
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12;
  if (h === 0) h = 12;
  const time = `${h}:${mm} ${ampm}`;
  if (durationMs > 24 * 60 * 60 * 1000) {
    const day = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"][d.getDay()];
    return `${day} ${time}`;
  }
  return time;
}
function el(tag, attrs, text) {
  const e = document.createElementNS("http://www.w3.org/2000/svg", tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  if (text != null) e.textContent = text;
  return e;
}
// fmtTooltipTime renders a "Mon Day h:mm AM/PM" stamp in local time —
// always carries the date so weekly tooltips spanning midnight stay
// unambiguous. Used in volume-bar hover titles.
function fmtTooltipTime(ms) {
  const d = new Date(ms);
  const month = ["Jan", "Feb", "Mar", "Apr", "May", "Jun",
                 "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"][d.getMonth()];
  let h = d.getHours();
  const mm = String(d.getMinutes()).padStart(2, "0");
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12;
  if (h === 0) h = 12;
  return `${month} ${d.getDate()} ${h}:${mm} ${ampm}`;
}

// kvSpan returns a <span> with the given text content and inline style. Used
// by renderStatus so the slack-release indicator can carry colour without
// concatenating HTML strings (which would let any future server-controlled
// value escape into markup — see the audit notes for the reflected-XSS sink
// this pattern existed to close).
function kvSpan(text, style) {
  const el = document.createElement("span");
  if (style) el.setAttribute("style", style);
  el.textContent = text;
  return el;
}

// appendKV appends a <dt>label</dt><dd>value</dd> pair to dl. value can be
// a string (set via textContent) or an Element (appended as a child).
function appendKV(dl, label, value) {
  const dt = document.createElement("dt");
  dt.textContent = label;
  const dd = document.createElement("dd");
  if (value instanceof Element) {
    dd.appendChild(value);
  } else {
    dd.textContent = String(value);
  }
  dl.appendChild(dt);
  dl.appendChild(dd);
}

// sessionStatusText computes the Session row's value. Uses the server's
// `now` (not Date.now()) so a skewed client clock can't shift the
// displayed remaining time. Backend guarantees that session_active=true
// implies session is non-null with ends_at set; the second guard is
// defensive only.
function sessionStatusText(s) {
  if (!s.session_active) return "not active";
  if (!s.session || !s.session.ends_at) return "active";
  const endMs = new Date(s.session.ends_at).getTime();
  const nowMs = s.now ? new Date(s.now).getTime() : Date.now();
  const remMs = Math.max(0, endMs - nowMs);
  const h = Math.floor(remMs / 3600000);
  const m = Math.floor((remMs % 3600000) / 60000);
  return `active (${h}h ${m}m remaining)`;
}

function renderStatus(s) {
  const kv = document.getElementById("status-kv");
  while (kv.firstChild) kv.removeChild(kv.firstChild);
  appendKV(kv, "Now", fmtTime(s.now));
  appendKV(kv, "Last snapshot age",
    s.last_snapshot_age_seconds == null ? "no snapshots yet" : fmt(s.last_snapshot_age_seconds, 0) + " s");
  appendKV(kv, "Parse errors (24h)", s.parse_errors_24h);
  appendKV(kv, "Paused", s.paused ? "yes" : "no");
  appendKV(kv, "Session", sessionStatusText(s));
  let slackEl;
  if (s.slack_release_recommended == null) {
    slackEl = kvSpan("—", "color:#888");
  } else if (s.slack_release_recommended) {
    slackEl = kvSpan("yes", "color:#060;font-weight:bold;");
  } else {
    slackEl = kvSpan("no", "color:#888;");
  }
  appendKV(kv, "Slack release", slackEl);
}

// renderBurnDown plots % remaining vs. time, with a dollar-volume bar
// chart underneath in the style of a stock price+volume chart.
//
// Layout (200 tall):
//   y=8..132    upper panel — % remaining (100 at top, 0 at bottom)
//   y=140..184  lower panel — $ consumption per bucket (bars grow upward from VOL_BOTTOM)
//   y=196       x-axis time labels shared across both panels
//
// X-axis spans [domainStart, end). The current window is always
// [start, end); domainStart can sit further back when opts.lookbackMs > 0
// (session view: 10h pre-window history). The pace line and the latest-
// dot delta-from-pace label only make sense within the current window.
//
//   - Dashed line: linear pace from (start, 100% remaining) to (end, 0%
//     remaining). Above = under pace = slack available. Below = burning
//     faster than uniform. Only drawn over the current window's portion.
//   - Solid blue line(s): actual % remaining over time, computed as
//     100 - percent_used from each snapshot in win.series. With an
//     extended domain the curve is split into one polyline per session
//     (grouped by snapshot's continuous_with_prev flag), so resets
//     show as a gap.
//   - Volume bars: per-bucket sum of cost_usd_equivalent across the full
//     domain. Y of the volume panel is auto-scaled to the largest bar.
//   - Vertical tick at `start` marks the current window's left edge when
//     the domain extends back beyond it.
function renderBurnDown(svgID, win, opts) {
  opts = opts || {};
  const svg = document.getElementById(svgID);
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  const W = 800, H = 200, P = 40;
  const PCT_TOP = 8, PCT_BOTTOM = 132;
  const VOL_TOP = 140, VOL_BOTTOM = 184;
  const AXIS_Y = 196;

  if (!win) {
    svg.appendChild(el("text", { x: W / 2, y: H / 2, "text-anchor": "middle", fill: "#888" }, "No active window"));
    return;
  }
  // Hypothetical windows are placeholders synthesized by the backend
  // when no real session is open. The right-third still gets the chart
  // frame so the user can read the 5h slope, but every right-third
  // element (slack-zone fill, pace diagonal, ends_at tick) is ghosted
  // via lighter fill/stroke + italic so it reads as projection rather
  // than live data. The "No data yet" and baseline-flat-segment fallbacks
  // are gated off (an in-chart annotation makes the no-session state
  // explicit instead), and the latest-dot pace-delta label is structurally
  // inert because the backend leaves in-window Series empty for the
  // hypothetical case.
  const hypothetical = win.hypothetical === true;
  const start = new Date(win.started_at).getTime();
  const end = new Date(win.ends_at).getTime();
  if (!(end > start)) {
    svg.appendChild(el("text", { x: W / 2, y: H / 2, "text-anchor": "middle", fill: "#888" }, "Invalid window"));
    return;
  }

  // Domain may extend backwards beyond the current window's start.
  const lookbackMs = opts.lookbackMs || 0;
  const domainStart = start - lookbackMs;
  const domainEnd = end;
  const sx = (t) => P + (W - 2 * P) * (t - domainStart) / (domainEnd - domainStart);
  // Y axis is inverted: pct=100 (full quota remaining) sits at the top of
  // the upper panel; pct=0 (exhausted) sits at the bottom.
  const syPct = (pct) => PCT_TOP + (PCT_BOTTOM - PCT_TOP) * (100 - pct) / 100;
  // Pace line as a function: 100% remaining at start, 0% at end. Only
  // valid inside the current window — used for the latest-dot delta.
  const paceRemainingAt = (t) => 100 * (1 - (t - start) / (end - start));

  // Upper panel border (left + bottom)
  svg.appendChild(el("line", { x1: P, y1: PCT_TOP, x2: P, y2: PCT_BOTTOM, stroke: "#444" }));
  svg.appendChild(el("line", { x1: P, y1: PCT_BOTTOM, x2: W - P, y2: PCT_BOTTOM, stroke: "#444" }));

  // Vertical marker at the current window's left edge when the domain
  // extends back past it. Helps the eye separate "history" from "now".
  if (lookbackMs > 0) {
    svg.appendChild(el("line", {
      x1: sx(start), y1: PCT_TOP, x2: sx(start), y2: VOL_BOTTOM,
      stroke: "#bbb", "stroke-dasharray": "2 3"
    }));
  }

  // Slack-activation zone: faint green polygon covering where the
  // headroom gate would pass for this window. Drawn beneath the pace
  // line and the data series so they remain readable on top.
  //   - opts.slackSurplusPct: pace-relative threshold in percentage
  //     points (e.g. 50 for session = "50pp above pace remaining").
  //   - opts.slackFloorPct: optional absolute percent_remaining floor
  //     (e.g. 80 for weekly). Above this, the gate passes regardless of
  //     pace. Pass 100 (or omit) to make the zone purely pace-relative —
  //     the polygon then degenerates to the upper-right triangle.
  if (opts.slackSurplusPct != null) {
    const surplus = opts.slackSurplusPct;
    const floor = opts.slackFloorPct != null ? opts.slackFloorPct : 100;
    const dur = end - start;
    // t where the offset pace line crosses the absolute floor (or the
    // chart top, when floor=100).
    const tFloorCross = start + ((100 - floor + surplus) / 100) * dur;
    // Vertices clockwise from top-left. When floor=100 the leftmost two
    // vertices both sit at y=100 → the polygon collapses to the triangle
    // (tFloorCross, 100), (end, 100), (end, surplus).
    const verts = [
      [start, 100],
      [end, 100],
      [end, surplus],
      [tFloorCross, floor],
      [start, floor],
    ];
    const points = verts.map(([t, pct]) => `${sx(t)},${syPct(pct)}`).join(" ");
    // Hypothetical → lighter fill (the chosen "projection" treatment).
    // No live usage means no real slack to highlight; we keep the polygon
    // visible only so the diagonal context isn't lost.
    svg.appendChild(el("polygon", {
      points: points, fill: "#6c6",
      opacity: hypothetical ? "0.07" : "0.18",
      stroke: "none"
    }));
  }

  // Pace line: (start, 100% remaining) → (end, 0% remaining), in current window only.
  // Hypothetical → lighter stroke; same dash pattern as the live chart so
  // the slope reads identically, just ghosted.
  svg.appendChild(el("line", {
    x1: sx(start), y1: syPct(100), x2: sx(end), y2: syPct(0),
    stroke: hypothetical ? "#bbb" : "#888",
    "stroke-dasharray": "3 3"
  }));

  // Observed % remaining series. Grouping into one polyline per session
  // is delegated to groupPolylines() (see static/grouping.js): a point
  // starts a new polyline whenever its continuous_with_prev flag is not
  // strictly true. Single-point groups render as small markers.
  const series = (win.series || []).filter(p => {
    const t = new Date(p.observed_at).getTime();
    return t >= domainStart && t < domainEnd;
  });

  if (series.length > 0) {
    const groups = groupPolylines(series);
    for (const g of groups) {
      if (g.length === 1) {
        const p = g[0];
        svg.appendChild(el("circle", {
          cx: sx(new Date(p.observed_at).getTime()),
          cy: syPct(100 - p.percent_used),
          r: "2", fill: "#06c"
        }));
        continue;
      }
      const pts = g.map(p =>
        `${sx(new Date(p.observed_at).getTime())},${syPct(100 - p.percent_used)}`
      ).join(" ");
      svg.appendChild(el("polyline", { points: pts, fill: "none", stroke: "#06c", "stroke-width": "2" }));
    }

    // Highlight the latest snapshot with a dot + label. When the latest
    // snapshot is inside the current window, suffix the label with the
    // delta from the pace line — green when ahead (more remaining than
    // pace expects), red when behind.
    const latest = series[series.length - 1];
    const lt = new Date(latest.observed_at).getTime();
    const lx = sx(lt);
    const remaining = 100 - latest.percent_used;
    const ly = syPct(remaining);
    svg.appendChild(el("circle", { cx: lx, cy: ly, r: "3", fill: "#06c" }));

    // Flip the label below the dot when it would clip the chart top.
    const labelAbove = ly - PCT_TOP >= 14;
    const labelY = labelAbove ? ly - 8 : ly + 14;
    const baseLabel = fmt(remaining) + "%";
    if (lt >= start && lt < end) {
      // Two tspans so the delta gets its own color without painting the
      // base remaining number red/green.
      const delta = remaining - paceRemainingAt(lt);
      const sign = delta >= 0 ? "+" : "−";
      const t = el("text", {
        x: lx, y: labelY, "font-size": "10", fill: "#06c", "text-anchor": "middle"
      });
      t.appendChild(document.createTextNode(baseLabel));
      const ts = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
      ts.setAttribute("fill", delta >= 0 ? "#060" : "#c00");
      ts.setAttribute("font-weight", "bold");
      ts.textContent = " (" + sign + fmt(Math.abs(delta)) + "%)";
      t.appendChild(ts);
      svg.appendChild(t);
    } else {
      svg.appendChild(el("text", {
        x: lx, y: labelY, "font-size": "10", fill: "#06c", "text-anchor": "middle"
      }, baseLabel));
    }
  } else if (win.baseline_percent_used != null && !hypothetical) {
    // No snapshots in the domain — flat segment at the baseline value
    // across the current window only.
    const now = Math.min(Math.max(Date.now(), start), end);
    const remaining = 100 - win.baseline_percent_used;
    svg.appendChild(el("line", {
      x1: sx(start), y1: syPct(remaining), x2: sx(now), y2: syPct(remaining),
      stroke: "#06c", "stroke-width": "2"
    }));
    const by = syPct(remaining);
    svg.appendChild(el("circle", { cx: sx(now), cy: by, r: "3", fill: "#06c" }));
    svg.appendChild(el("text", {
      x: sx(now), y: by - PCT_TOP >= 14 ? by - 8 : by + 14,
      "font-size": "10", fill: "#06c", "text-anchor": "middle"
    }, fmt(remaining) + "%"));
  } else if (!hypothetical) {
    svg.appendChild(el("text", {
      x: W / 2, y: (PCT_TOP + PCT_BOTTOM) / 2, "text-anchor": "middle", fill: "#888"
    }, "No data yet"));
  }

  // Hypothetical projection annotation: anchored over the right-third
  // window so it's unambiguous what the dashed slope represents. Placed
  // in the upper portion (inside/just below the slack-zone region) where
  // the pace diagonal sits low enough that it only nicks the bottom line
  // near its left edge. Two lines so the full message fits at
  // session-chart width without truncation.
  if (hypothetical) {
    const annoX = (sx(start) + sx(end)) / 2;
    svg.appendChild(el("text", {
      x: annoX, y: 22, "font-size": "11", fill: "#666",
      "text-anchor": "middle", "font-style": "italic"
    }, "No active session"));
    svg.appendChild(el("text", {
      x: annoX, y: 36, "font-size": "11", fill: "#666",
      "text-anchor": "middle", "font-style": "italic"
    }, "projection if started now"));
  }

  // Lower panel: $ volume bars over the full domain. Buckets are
  // UTC-aligned, so the leftmost bucket's start can sit slightly before
  // domainStart (e.g. window starts 12:34, 15-min bucket starts 12:30).
  // We keep any bucket that overlaps the domain and clip the rendered
  // bar's x extent to the chart, rather than dropping the bucket entirely
  // — otherwise events in the first partial bucket render as nothing.
  const bucketMs = (win.bucket_secs || 900) * 1000;
  const volume = (win.volume || []).filter(b => {
    const t = new Date(b.bucket_start).getTime();
    return t + bucketMs > domainStart && t < domainEnd;
  });
  // Volume panel border (baseline only)
  svg.appendChild(el("line", { x1: P, y1: VOL_BOTTOM, x2: W - P, y2: VOL_BOTTOM, stroke: "#444" }));
  svg.appendChild(el("line", { x1: P, y1: VOL_TOP, x2: P, y2: VOL_BOTTOM, stroke: "#444" }));

  if (volume.length > 0) {
    const maxVol = Math.max.apply(null, volume.map(b => b.cost_usd));
    if (maxVol > 0) {
      // Each bar covers its actual bucket duration on the X axis —
      // [bucket_start, bucket_start + bucket_secs) — so bar width
      // reflects time, not the count of populated buckets. SQL GROUP BY
      // only returns buckets with data, so a 15h session chart with 10
      // active 15-min buckets still renders bars at 15-min width (~5 px),
      // not 1/10 of the chart wide.
      const volH = VOL_BOTTOM - VOL_TOP;
      const xMin = P, xMax = W - P;
      for (const b of volume) {
        const t = new Date(b.bucket_start).getTime();
        // Clip the rendered bar to the chart extent so a partial leftmost
        // bucket doesn't draw outside the panel.
        const x0 = Math.max(xMin, sx(t));
        const x1 = Math.min(xMax, sx(t + bucketMs));
        const span = x1 - x0;
        if (span <= 0) continue;
        // Small inset so adjacent populated buckets don't visually merge.
        const inset = Math.max(0.5, span * 0.1);
        const x = x0 + inset / 2;
        const w = Math.max(1, span - inset);
        const h = (b.cost_usd / maxVol) * volH;
        const rect = el("rect", {
          x: x, y: VOL_BOTTOM - h, width: w, height: h,
          fill: "#06c", opacity: "0.7"
        });
        // Native browser tooltip on hover. Multi-line via newline; the
        // first line carries the date so weekly buckets crossing midnight
        // remain unambiguous.
        const startLabel = fmtTooltipTime(t);
        const endLabel = fmtTooltipTime(t + bucketMs);
        rect.appendChild(el("title", {}, startLabel + " – " + endLabel + "\n$" + fmt(b.cost_usd)));
        svg.appendChild(rect);
      }
      // Max-volume label on the volume panel
      svg.appendChild(el("text", {
        x: 4, y: VOL_TOP + 4, "font-size": "9", fill: "#444"
      }, "$" + fmt(maxVol)));
    }
  }

  // Axis labels: leftmost = domainStart, rightmost = end. When the
  // domain is extended, also label the current window's left edge.
  const dur = domainEnd - domainStart;
  svg.appendChild(el("text", { x: P, y: AXIS_Y, "font-size": "10", fill: "#444" }, fmtAxisTime(domainStart, dur)));
  // ends_at is muted/italic for hypothetical so it visually pairs with
  // the projection annotation rather than the concrete left-side ticks.
  svg.appendChild(el("text", {
    x: W - P, y: AXIS_Y, "font-size": "10",
    fill: hypothetical ? "#888" : "#444",
    "font-style": hypothetical ? "italic" : "normal",
    "text-anchor": "end"
  }, fmtAxisTime(end, dur)));
  if (lookbackMs > 0) {
    svg.appendChild(el("text", {
      x: sx(start), y: AXIS_Y, "font-size": "10", fill: "#444", "text-anchor": "middle"
    }, fmtAxisTime(start, dur)));
  }
  svg.appendChild(el("text", { x: 4, y: PCT_TOP + 4, "font-size": "10", fill: "#444" }, "100%"));
  svg.appendChild(el("text", { x: 4, y: PCT_BOTTOM, "font-size": "10", fill: "#444" }, "0"));
}

function renderConsumption(d) {
  const kv = document.getElementById("consumption-kv");
  while (kv.firstChild) kv.removeChild(kv.firstChild);
  if (!d || d.error) {
    const dd = document.createElement("dd");
    dd.className = "muted";
    dd.textContent = "unavailable";
    kv.appendChild(dd);
    return;
  }
  // d.period is whatever the caller passed in ?period= and the server
  // echoes back. Building it via textContent (not innerHTML) means a
  // hostile value never reaches the HTML parser.
  appendKV(kv, "Period", d.period);
  appendKV(kv, "Consumed (USD eq.)", "$" + fmt(d.consumed_usd_equivalent));
  appendKV(kv, "Consumed % session", d.consumed_session_pct == null ? "—" : fmt(d.consumed_session_pct, 0) + "%");
  appendKV(kv, "Consumed % weekly", d.consumed_weekly_pct == null ? "—" : fmt(d.consumed_weekly_pct, 0) + "%");
  appendKV(kv, "Events (total / reported / computed / none)",
    d.events_total + " / " + d.events_with_reported_cost + " / " + d.events_with_computed_cost + " / " + d.events_without_cost);
}

async function refresh() {
  try {
    const sResp = await fetch("/api/dashboard/state");
    const s = await sResp.json();
    renderStatus(s);
    // Session: extend domain 10h backwards so the current 5h window
    // sits in the rightmost third and the prior two sessions are
    // visible for context. Slack zone = "50pp above pace" UNION
    // "≥98% remaining" (mirrors SessionAbsoluteThreshold=0.98).
    renderBurnDown("chart-session", s.session, {
      lookbackMs: 10 * 3600 * 1000,
      slackSurplusPct: 50,
      slackFloorPct: 98,
    });
    // Weekly slack zone = "10pp above pace" UNION "≥80% remaining".
    renderBurnDown("chart-weekly", s.weekly, {
      slackSurplusPct: 10,
      slackFloorPct: 80,
    });
  } catch (e) { console.error("state error", e); }
  try {
    const dResp = await fetch("/consumption?period=24h");
    const d = await dResp.json();
    renderConsumption(d);
  } catch (e) { console.error("consumption error", e); }
}

refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
