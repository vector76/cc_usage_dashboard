<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Claude Usage Dashboard</title>
<link rel="icon" type="image/png" href="/favicon.png">
<style>
  body { font-family: system-ui, -apple-system, sans-serif; margin: 1rem; background: #fafafa; color: #222; }
  h1 { margin: 0 0 1rem 0; font-size: 1.4rem; }
  h2 { margin-top: 0; font-size: 1.1rem; }
  h3 { margin: 0 0 0.5rem 0; font-size: 0.95rem; color: #444; }
  section { background: #fff; border: 1px solid #ddd; padding: 1rem; margin-bottom: 1rem; border-radius: 4px; }
  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 700px) { .charts { grid-template-columns: 1fr; } }
  .kv { display: grid; grid-template-columns: max-content auto; column-gap: 1rem; row-gap: 0.25rem; margin: 0; }
  .kv dt { color: #666; }
  .kv dd { margin: 0; font-variant-numeric: tabular-nums; }
  .alert { color: #c00; font-weight: bold; }
  .ok { color: #060; }
  .muted { color: #888; }
  svg { width: 100%; height: auto; display: block; }
</style>
</head>
<body>
<h1>Claude Usage Dashboard</h1>

<section id="status">
  <h2>Status</h2>
  <dl class="kv" id="status-kv"><dd class="muted">Loading…</dd></dl>
</section>

<section>
  <h2>Burn-down</h2>
  <div class="charts">
    <div>
      <h3>Session window</h3>
      <svg id="chart-session" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
    <div>
      <h3>Weekly window</h3>
      <svg id="chart-weekly" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
  </div>
</section>

<section id="consumption">
  <h2>Consumption (last 24h)</h2>
  <dl class="kv" id="consumption-kv"><dd class="muted">Loading…</dd></dl>
</section>

<script>
function fmt(x, d) {
  if (x == null || (typeof x === "number" && !isFinite(x))) return "—";
  return Number(x).toFixed(d == null ? 2 : d);
}
function fmtTime(s) { return s ? new Date(s).toLocaleString() : "—"; }
// fmtAxisTime renders a short 12-hour AM/PM label for the burn-down X
// axis. Short windows (session, ≤24h) get "h:mm AM/PM" in local time;
// longer windows (weekly) get the weekday prefix so "Thu 11:00 PM" is
// unambiguous when the chart spans a week.
function fmtAxisTime(ms, durationMs) {
  const d = new Date(ms);
  let h = d.getHours();
  const mm = String(d.getMinutes()).padStart(2, "0");
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12;
  if (h === 0) h = 12;
  const time = `${h}:${mm} ${ampm}`;
  if (durationMs > 24 * 60 * 60 * 1000) {
    const day = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"][d.getDay()];
    return `${day} ${time}`;
  }
  return time;
}
function el(tag, attrs, text) {
  const e = document.createElementNS("http://www.w3.org/2000/svg", tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  if (text != null) e.textContent = text;
  return e;
}

function renderStatus(s) {
  const kv = document.getElementById("status-kv");
  const lines = [];
  lines.push(["Now", fmtTime(s.now)]);
  lines.push(["Last snapshot age", s.last_snapshot_age_seconds == null ? "no snapshots yet" : fmt(s.last_snapshot_age_seconds, 0) + " s"]);
  lines.push(["Parse errors (24h)", s.parse_errors_24h]);
  lines.push(["Paused", s.paused ? "yes" : "no"]);
  kv.innerHTML = lines.map(function (kv) { return "<dt>" + kv[0] + "</dt><dd>" + kv[1] + "</dd>"; }).join("");
}

// renderBurnDown plots % remaining vs. time within a window, with a
// dollar-volume bar chart underneath in the style of a stock price+volume
// chart. Layout (200 tall):
//   y=8..132    upper panel — % remaining (100 at top, 0 at bottom)
//   y=140..184  lower panel — $ consumption per bucket (bars from baseline)
//   y=192       x-axis time labels shared across both panels
//
//   - Dashed line: linear pace from (start, 100% remaining) to (end, 0%
//     remaining). Above = under pace = slack available. Below = burning
//     faster than uniform.
//   - Solid blue line: actual % remaining over time, computed as
//     100 - percent_used from each snapshot in win.series.
//   - Volume bars: per-bucket sum of cost_usd_equivalent inside the
//     window. Y of the volume panel is auto-scaled to the largest bar.
function renderBurnDown(svgID, win) {
  const svg = document.getElementById(svgID);
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  const W = 400, H = 200, P = 32;
  const PCT_TOP = 8, PCT_BOTTOM = 132;
  const VOL_TOP = 140, VOL_BOTTOM = 184;
  const AXIS_Y = 196;

  if (!win) {
    svg.appendChild(el("text", { x: W / 2, y: H / 2, "text-anchor": "middle", fill: "#888" }, "No active window"));
    return;
  }
  const start = new Date(win.started_at).getTime();
  const end = new Date(win.ends_at).getTime();
  if (!(end > start)) {
    svg.appendChild(el("text", { x: W / 2, y: H / 2, "text-anchor": "middle", fill: "#888" }, "Invalid window"));
    return;
  }
  const sx = (t) => P + (W - 2 * P) * (t - start) / (end - start);
  // Y axis is inverted: pct=100 (full quota remaining) sits at the top of
  // the upper panel; pct=0 (exhausted) sits at the bottom.
  const syPct = (pct) => PCT_TOP + (PCT_BOTTOM - PCT_TOP) * (100 - pct) / 100;

  // Upper panel border (left + bottom)
  svg.appendChild(el("line", { x1: P, y1: PCT_TOP, x2: P, y2: PCT_BOTTOM, stroke: "#444" }));
  svg.appendChild(el("line", { x1: P, y1: PCT_BOTTOM, x2: W - P, y2: PCT_BOTTOM, stroke: "#444" }));

  // Pace line: (start, 100% remaining) → (end, 0% remaining)
  svg.appendChild(el("line", {
    x1: sx(start), y1: syPct(100), x2: sx(end), y2: syPct(0),
    stroke: "#888", "stroke-dasharray": "3 3"
  }));

  // Observed % remaining series
  const series = (win.series || []).filter(p => {
    const t = new Date(p.observed_at).getTime();
    return t >= start && t < end;
  });
  if (series.length > 0) {
    const points = series.map(p => `${sx(new Date(p.observed_at).getTime())},${syPct(100 - p.percent_used)}`).join(" ");
    svg.appendChild(el("polyline", { points, fill: "none", stroke: "#06c", "stroke-width": "2" }));
    const latest = series[series.length - 1];
    const lx = sx(new Date(latest.observed_at).getTime());
    const remaining = 100 - latest.percent_used;
    const ly = syPct(remaining);
    svg.appendChild(el("circle", { cx: lx, cy: ly, r: "4", fill: "#06c" }));
    svg.appendChild(el("text", {
      x: lx, y: ly - 8, "font-size": "10", fill: "#06c", "text-anchor": "middle"
    }, fmt(remaining) + "%"));
  } else if (win.baseline_total != null) {
    // No in-window snapshots yet — flat segment at the baseline value.
    const now = Math.min(Math.max(Date.now(), start), end);
    const remaining = 100 - win.baseline_total;
    svg.appendChild(el("line", {
      x1: sx(start), y1: syPct(remaining), x2: sx(now), y2: syPct(remaining),
      stroke: "#06c", "stroke-width": "2"
    }));
    svg.appendChild(el("circle", { cx: sx(now), cy: syPct(remaining), r: "4", fill: "#06c" }));
    svg.appendChild(el("text", {
      x: sx(now), y: syPct(remaining) - 8, "font-size": "10", fill: "#06c", "text-anchor": "middle"
    }, fmt(remaining) + "%"));
  } else {
    svg.appendChild(el("text", {
      x: W / 2, y: (PCT_TOP + PCT_BOTTOM) / 2, "text-anchor": "middle", fill: "#888"
    }, "No data yet"));
  }

  // Lower panel: $ volume bars
  const volume = (win.volume || []).filter(b => {
    const t = new Date(b.bucket_start).getTime();
    return t >= start && t < end;
  });
  // Volume panel border (baseline only)
  svg.appendChild(el("line", { x1: P, y1: VOL_BOTTOM, x2: W - P, y2: VOL_BOTTOM, stroke: "#444" }));
  svg.appendChild(el("line", { x1: P, y1: VOL_TOP, x2: P, y2: VOL_BOTTOM, stroke: "#444" }));

  if (volume.length > 0) {
    const maxVol = Math.max.apply(null, volume.map(b => b.cost_usd));
    if (maxVol > 0) {
      // Each bar covers its actual bucket duration on the X axis —
      // [bucket_start, bucket_start + bucket_secs) — so bar width
      // reflects time, not the number of populated buckets. SQL
      // GROUP BY only returns buckets with data, so a 5h chart with 10
      // active 5-min buckets must still render bars at 5-min width
      // (~6 px), not 1/10 of the chart wide.
      const bucketMs = (win.bucket_secs || 300) * 1000;
      const volH = VOL_BOTTOM - VOL_TOP;
      for (const b of volume) {
        const t = new Date(b.bucket_start).getTime();
        const x0 = sx(t);
        const x1 = sx(t + bucketMs);
        // Left-align to the bucket's start; small inset so adjacent
        // populated buckets don't visually merge.
        const inset = Math.max(0.5, (x1 - x0) * 0.1);
        const x = x0 + inset / 2;
        const w = Math.max(1, (x1 - x0) - inset);
        const h = (b.cost_usd / maxVol) * volH;
        svg.appendChild(el("rect", {
          x: x, y: VOL_BOTTOM - h, width: w, height: h,
          fill: "#06c", opacity: "0.7"
        }));
      }
      // Max-volume label on the volume panel
      svg.appendChild(el("text", {
        x: 4, y: VOL_TOP + 4, "font-size": "9", fill: "#444"
      }, "$" + fmt(maxVol)));
    }
  }

  // Axis labels
  const dur = end - start;
  svg.appendChild(el("text", { x: P, y: AXIS_Y, "font-size": "10", fill: "#444" }, fmtAxisTime(start, dur)));
  svg.appendChild(el("text", { x: W - P, y: AXIS_Y, "font-size": "10", fill: "#444", "text-anchor": "end" }, fmtAxisTime(end, dur)));
  svg.appendChild(el("text", { x: 4, y: PCT_TOP + 4, "font-size": "10", fill: "#444" }, "100%"));
  svg.appendChild(el("text", { x: 4, y: PCT_BOTTOM, "font-size": "10", fill: "#444" }, "0"));
}

function renderConsumption(d) {
  const kv = document.getElementById("consumption-kv");
  if (!d || d.error) { kv.innerHTML = '<dd class="muted">unavailable</dd>'; return; }
  const lines = [];
  lines.push(["Period", d.period]);
  lines.push(["Consumed (USD eq.)", "$" + fmt(d.consumed_usd_equivalent)]);
  lines.push(["Consumed % session", d.consumed_session_pct == null ? "—" : fmt(d.consumed_session_pct) + "%"]);
  lines.push(["Consumed % weekly", d.consumed_weekly_pct == null ? "—" : fmt(d.consumed_weekly_pct) + "%"]);
  lines.push(["Events (total / reported / computed / none)",
    d.events_total + " / " + d.events_with_reported_cost + " / " + d.events_with_computed_cost + " / " + d.events_without_cost]);
  kv.innerHTML = lines.map(function (kv) { return "<dt>" + kv[0] + "</dt><dd>" + kv[1] + "</dd>"; }).join("");
}

async function refresh() {
  try {
    const sResp = await fetch("/api/dashboard/state");
    const s = await sResp.json();
    renderStatus(s);
    renderBurnDown("chart-session", s.session);
    renderBurnDown("chart-weekly", s.weekly);
  } catch (e) { console.error("state error", e); }
  try {
    const dResp = await fetch("/consumption?period=24h");
    const d = await dResp.json();
    renderConsumption(d);
  } catch (e) { console.error("consumption error", e); }
}

refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
