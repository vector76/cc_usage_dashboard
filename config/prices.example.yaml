# Anthropic Messages API rates, sourced from
# https://platform.claude.com/docs/en/about-claude/pricing
#
# All rates are in USD per million tokens (MTok). Verified against the
# user-visible /cost output of a real Claude Code session: Haiku 4.5 and
# Opus 4.7 reconciled to within $0.05 of /cost using these numbers.
#
# Cache write rate convention: 5-minute (1.25x input). Anthropic also
# bills a 1-hour cache write at 2x input. usage_events stores a single
# cache_creation_tokens column that mixes both kinds, so we pick the
# lower (5m) rate as the default since that's what Claude Code uses by
# default. A session leaning heavily on explicit 1h caching will be
# slightly under-counted; splitting 5m vs 1h cleanly would require a
# schema migration and is deferred until it bites.

models:
  # ---- Opus 4.5+ family: repriced down to Sonnet-class rates ----
  # Earlier Opus 4 / 4.1 stayed at the original $15/$75 tier; only 4.5+
  # moved. Opus 4.7 also uses a new tokenizer that may use up to 35%
  # more tokens for the same text — that affects token counts in the
  # transcript but not these per-token rates.
  claude-opus-4-7:
    input_rate_usd_per_m: 5.00
    output_rate_usd_per_m: 25.00
    cache_creation_rate_usd_per_m: 6.25
    cache_read_rate_usd_per_m: 0.50

  claude-opus-4-6:
