# Example price configuration for Claude usage dashboard.
# Copy to prices.yaml and update rates as Anthropic publishes new ones.
#
# All rates are in USD per million tokens, matching Anthropic's published
# Messages API pricing.
#
# Cache rates: usage_events stores a single cache_creation_tokens column,
# so we can't distinguish 5-minute (1.25x input) from 1-hour (2x input)
# cache writes here. Claude Code in practice uses 1-hour caching for
# system prompts and stable context, so the rates below use the 1h
# multiplier — that's accurate when 1h dominates and a slight over-count
# when a session leans on 5m caching.

models:
  # ---- Claude 4.x family (current as of early 2026) ----
  claude-opus-4-7:
    input_rate_usd_per_m: 15.00
    output_rate_usd_per_m: 75.00
    cache_creation_rate_usd_per_m: 30.00
    cache_read_rate_usd_per_m: 1.50

  claude-opus-4-6:
